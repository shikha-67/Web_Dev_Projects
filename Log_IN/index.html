<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
   <form>
    <h2>LogIn</h2>
    <div>
      <label>Name</label>
      <input type="text" name="userName" class="name box">
    </div>
    <div>
      <label>Father's Name</label>
      <input type="text" name="userfathername" class="f_name box">
    </div>
    <div>
      <label>Age</label>
      <input type="number" name="userAge" class="age box">
    </div>

    <p>Gender:</p>
    <label for="Male">Male</label>
    <input type="radio" name="gender" value="male" id="Male">

     <label for="Female">Female</label>
    <input type="radio" name="gender" value="female" id="Female">

    <label for="Other">Other</label>
    <input type="radio" name="gender" value="other" id="Other">

     <p>Courses:</p>
    <label for="C++">C++</label>
    <input type="checkbox" value="C++" name="subject">

    <label for="Python">Python</label>
    <input type="checkbox" value="Python" name="subject">

    <label for="C#">C#</label>
    <input type="checkbox" value="C#" name="subject">
</body>

</html>
