<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <form>
    <h2>LogIn</h2>
    <div>
      <label class="box">Name:</label>
      <input type="text" name="userName" class="input">
    </div>
    <div>
      <label class="box">Father's Name:</label>
      <input type="text" name="userfathername" class="input">
    </div>
    <div>
      <label class="box">Age:</label>
      <input type="number" name="userAge" class="input">
    </div>

    <div>
      <p class="box">Gender:</p>
      <label for="Male" class="box">Male</label>
      <input type="radio" name="gender" value="male" class="input">

      <label for="Female" class="box">Female</label>
      <input type="radio" name="gender" value="female" class="input">

      <label for="Other" class="box">Other</label>
      <input type="radio" name="gender" value="other" class="input">
    </div>

    <div>
    <p class="box">Courses:</p>
    <label for="C++" class="box">C++</label>
    <input type="checkbox" value="C++" name="subject">

    <label for="Python" class="box">Python</label>
    <input type="checkbox" value="Python" name="subject">

    <label for="C#" class="box">C#</label>
    <input type="checkbox" value="C#" name="subject">
    </div>

    <button class="submit">Submit</button>
    
</body>

</html>
